version: 2

version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: deps
      include: scope
    groups:
      production-dependencies:
        dependency-type: production
      development-dependencies:
        dependency-type: development
