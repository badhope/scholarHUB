name: Bug Report
description: Something is broken or behaving wrong.
title: "[bug]: "
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time. The more detail, the faster I can
        reproduce and fix this.

  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: Clear, short description of the bug.
      placeholder: "When I run `...`, I get `...` instead of `...`."
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Numbered. Smallest example you can manage.
      placeholder: |
        1. Install with `...`
        2. Run `...`
        3. Open `...`
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual (include logs / stack traces)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: "v1.2.3 or abcdef0"
    validations:
      required: true

  - type: dropdown
    id: where
    attributes:
      label: Where did you run it?
      options:
        - Local (macOS)
        - Local (Linux)
        - Local (Windows)
        - Docker / container
        - CI
        - Cloud / VM
        - Other
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: How bad?
      options:
        - Low (cosmetic / minor inconvenience)
        - Medium (broken feature, workaround exists)
        - High (broken feature, no workaround)
        - Critical (data loss, security, outage)
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Anything else
    validations:
      required: false
